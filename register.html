<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - RMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#060d1a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(124,58,237,.12) 0,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.1) 0,transparent 60%);pointer-events:none}
.wrap{position:relative;z-index:1;width:100%;max-width:480px}
.logo{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:block;text-align:center;margin-bottom:1.5rem}
.card{background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:2.5rem;backdrop-filter:blur(20px)}
.card h2{font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
.card .sub{color:#64748b;font-size:.875rem;margin-bottom:2rem}
.alert{padding:.75rem 1rem;border-radius:.75rem;font-size:.85rem;margin-bottom:1.25rem;display:none;align-items:center;gap:.5rem}
.alert.show{display:flex}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:.4rem}
.iw{position:relative}
.iw i{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:#475569;font-size:.85rem;pointer-events:none}
.iw input,.iw select{width:100%;padding:.8rem 1rem .8rem 2.5rem;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.08);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;font-family:inherit;transition:border-color .2s,box-shadow .2s;appearance:none}
.iw input:focus,.iw select:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.iw select option{background:#0f172a}
.eye{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;padding:0}
.pw-bar{height:3px;border-radius:999px;background:rgba(255,255,255,.06);margin-top:.4rem;overflow:hidden}
.pw-fill{height:100%;border-radius:999px;width:0;transition:width .3s,background .3s}
.pw-hint{font-size:.72rem;color:#475569;margin-top:.25rem}
.btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;border-radius:.75rem;font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.5rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(124,58,237,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{text-align:center;color:#64748b;font-size:.875rem;margin-top:1.25rem}
.foot a{color:#06b6d4;font-weight:600;text-decoration:none}
input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px #0f172a inset!important;-webkit-text-fill-color:#f1f5f9!important}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
<a href="index.html" class="logo">&#9889; RMS Platform</a>
<div class="card">
<h2>Create account</h2>
<p class="sub">Join thousands of learners on their tech journey</p>
<div class="alert err" id="err"><i class="fas fa-circle-exclamation"></i><span id="em"></span></div>
<div class="alert ok" id="ok"><i class="fas fa-circle-check"></i><span id="om"></span></div>
<form id="form" novalidate>
<div class="row2">
<div class="fg">
<label>Username</label>
<div class="iw"><i class="fas fa-user"></i><input type="text" id="uname" placeholder="cooldev" required minlength="3"></div>
</div>
<div class="fg">
<label>Level</label>
<div class="iw"><i class="fas fa-layer-group"></i>
<select id="level">
<option value="beginner">Beginner</option>
<option value="intermediate">Intermediate</option>
<option value="advanced">Advanced</option>
</select>
</div>
</div>
</div>
<div class="fg">
<label>Email</label>
<div class="iw"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="you@example.com" required></div>
</div>
<div class="fg">
<label>Password</label>
<div class="iw"><i class="fas fa-lock"></i><input type="password" id="pw" placeholder="Min 6 characters" required oninput="checkPw(this.value)"><button type="button" class="eye" onclick="togglePw()"><i class="fas fa-eye" id="eyeico"></i></button></div>
<div class="pw-bar"><div class="pw-fill" id="pwfill"></div></div>
<div class="pw-hint" id="pwhint">Enter a password</div>
</div>
<div class="fg">
<label>Learning Style</label>
<div class="iw"><i class="fas fa-brain"></i>
<select id="style">
<option value="visual">Visual Learner</option>
<option value="reading">Reading / Writing</option>
<option value="auditory">Auditory</option>
<option value="kinesthetic">Hands-on</option>
</select>
</div>
</div>
<button type="submit" class="btn" id="btn">
<div class="spin" id="spin"></div>
<span id="btxt"><i class="fas fa-user-plus"></i> Create Account</span>
</button>
</form>
<div class="foot">Already have an account? <a href="login.html">Sign in</a></div>
</div>
</div>
<script>
if(localStorage.getItem('rms_token'))window.location.href='home.html';
function togglePw(){var i=document.getElementById('pw'),e=document.getElementById('eyeico');i.type=i.type==='password'?'text':'password';e.className=i.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
function checkPw(v){var f=document.getElementById('pwfill'),h=document.getElementById('pwhint');var s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;var pct=[0,20,45,70,100][s]||0;var cols=['','#ef4444','#f59e0b','#3b82f6','#10b981'];var msgs=['Enter a password','Too weak','Fair','Good','Strong'];f.style.width=pct+'%';f.style.background=cols[s]||'#ef4444';h.textContent=msgs[s]||'Enter a password';}
function showErr(m){document.getElementById('em').textContent=m;document.getElementById('err').classList.add('show');document.getElementById('ok').classList.remove('show');}
function showOk(m){document.getElementById('om').textContent=m;document.getElementById('ok').classList.add('show');document.getElementById('err').classList.remove('show');}
function setLoad(on){document.getElementById('spin').style.display=on?'block':'none';document.getElementById('btxt').style.display=on?'none':'flex';document.getElementById('btn').disabled=on;}
document.getElementById('form').addEventListener('submit',async function(e){
e.preventDefault();
var username=document.getElementById('uname').value.trim();
var email=document.getElementById('email').value.trim();
var password=document.getElementById('pw').value;
var learningStyle=document.getElementById('style').value;
var currentLevel=document.getElementById('level').value;
if(!username||!email||!password){showErr('Please fill in all fields.');return;}
if(password.length<6){showErr('Password must be at least 6 characters.');return;}
setLoad(true);
try{
var res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,email:email,password:password,learningStyle:learningStyle,currentLevel:currentLevel})});
var d=await res.json();
if(!res.ok){showErr(d.msg||'Registration failed.');setLoad(false);return;}
localStorage.setItem('rms_token',d.token);
localStorage.setItem('rms_user',JSON.stringify(d.user));
showOk('Account created! Redirecting...');
setTimeout(function(){window.location.href='home.html';},900);
}catch(ex){showErr('Connection error. Is the server running?');setLoad(false);}
});
</script>
</body>
</html>
